<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb; display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 2rem;
    }
    .setup-card {
      background: white; padding: 2rem; border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 420px;
    }
    h2 { margin-bottom: 0.25rem; font-size: 1.25rem; }
    p.subtitle { color: #6b7280; font-size: 0.875rem; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.375rem; color: #374151; }
    input, select { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.875rem; }
    input:focus, select:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,0.1); }
    .btn { padding: 0.5rem 1.25rem; border-radius: 6px; font-size: 0.875rem; font-weight: 500; cursor: pointer; border: none; }
    .btn-primary { background: #2563eb; color: white; width: 100%; }
    .btn-primary:hover { background: #1d4ed8; }
    .mode-option {
      border: 2px solid #e5e7eb; border-radius: 8px; padding: 1rem;
      margin-bottom: 0.75rem; cursor: pointer; transition: all 0.2s;
    }
    .mode-option:hover { border-color: #93c5fd; }
    .mode-option.selected { border-color: #2563eb; background: #eff6ff; }
    .mode-option h4 { font-size: 0.9375rem; margin-bottom: 0.25rem; }
    .mode-option p { font-size: 0.8125rem; color: #6b7280; }
    .hidden { display: none; }
    #ip-field { transition: all 0.3s; }
  </style>
</head>
<body>
  <div class="setup-card">
    <h2>Configuracion inicial</h2>
    <p class="subtitle">Elige como quieres usar el sistema</p>

    <div id="mode-server" class="mode-option" data-mode="server">
      <h4>Servidor (Area Informatica)</h4>
      <p>Este PC ejecutara el servidor. Otros usuarios se conectaran a el.</p>
    </div>

    <div id="mode-client" class="mode-option" data-mode="client">
      <h4>Cliente (Otras areas)</h4>
      <p>Te conectaras a un servidor que ya esta corriendo en la red.</p>
    </div>

    <div id="ip-field" class="hidden">
      <div class="form-group">
        <label>Direccion del servidor</label>
        <input type="text" id="server-ip" placeholder="Ej: 192.168.1.100:5000" value="192.168.1.100:5000">
      </div>
    </div>

    <div style="margin-top:1.5rem">
      <button class="btn btn-primary" id="btn-continuar" disabled>Continuar</button>
    </div>
  </div>

  <script>
    let selectedMode = null;

    document.getElementById("mode-server").addEventListener("click", () => {
      selectedMode = "server";
      document.querySelectorAll(".mode-option").forEach(e => e.classList.remove("selected"));
      document.getElementById("mode-server").classList.add("selected");
      document.getElementById("ip-field").classList.add("hidden");
      document.getElementById("btn-continuar").disabled = false;
    });

    document.getElementById("mode-client").addEventListener("click", () => {
      selectedMode = "client";
      document.querySelectorAll(".mode-option").forEach(e => e.classList.remove("selected"));
      document.getElementById("mode-client").classList.add("selected");
      document.getElementById("ip-field").classList.remove("hidden");
      document.getElementById("btn-continuar").disabled = false;
    });

    document.getElementById("btn-continuar").addEventListener("click", () => {
      let config = { mode: selectedMode };
      if (selectedMode === "client") {
        config.serverIp = document.getElementById("server-ip").value.trim();
        if (!config.serverIp) { alert("Ingresa la IP del servidor"); return; }
        if (!config.serverIp.includes(":")) config.serverIp += ":5000";
      }
      try {
        window.electronAPI.guardarConfig(config);
        window.electronAPI.reiniciarApp();
      } catch (e) {
        alert("Error al guardar configuracion: " + e.message);
      }
    });
  </script>
</body>
</html>
