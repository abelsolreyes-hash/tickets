services:
  - type: web
    name: sistema-tickets
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120 --access-logfile -
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: tickets-db
          property: connectionString
      - key: PORT
        value: "10000"

databases:
  - name: tickets-db
    databaseName: tickets
    plan: free
